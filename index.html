<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Character Counter</h2>

<p class="limit">200 Characters Max</p>

<textarea id="textArea" placeholder="Type here..."></textarea>

<p id="counter" class="counter">0/200 characters</p>

<p id="warning" class="warning"></p>

</div>

<script>

const textarea=document.getElementById("textArea");
const counter=document.getElementById("counter");
const warning=document.getElementById("warning");

const maxLength=200;

textarea.addEventListener("input",function(){

    let text=textarea.value;

    if(text.length>maxLength){
        textarea.value=text.substring(0,maxLength);
        warning.textContent="⚠ Character limit reached!";
    }
    else{
        warning.textContent="";
    }

    let current=textarea.value.length;
    counter.textContent=current + "/" + maxLength + " characters";

});

</script>

</body>
</html>
